<style>
  :root{
    --navy:#101a2e; --navy-2:#182644; --paper:#faf8f3; --card:#ffffff;
    --ink:#1a2130; --muted:#767161; --line:#e4ded0;
    --gold:#b4863c; --gold-soft:#f6ecd8;
    --stamp:#9c3b2e; --stamp-soft:#f7e6e2;
    --ok:#2f6b3a; --ok-soft:#e9f3ea; --warn:#a15c00; --warn-soft:#fdf1dc;
    --mono:'IBM Plex Mono',monospace; --serif:'Source Serif 4','Georgia',serif; --sans:'IBM Plex Sans',sans-serif;
  }
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:wght@600;700&display=swap');
  *{box-sizing:border-box;}
  body{margin:0;background:transparent;font-family:var(--sans);color:var(--ink);}
  .wrap{max-width:980px;margin:0 auto;padding:22px 16px 60px;}

  .hdr{display:flex;align-items:center;justify-content:space-between;padding:6px 0 20px;margin-bottom:22px;
       border-bottom:3px solid var(--navy); position:relative;}
  .hdr::after{content:'';position:absolute;bottom:-6px;left:0;right:0;height:1px;background:var(--gold);}
  .hdr-left{display:flex;align-items:center;gap:14px;}
  .seal{width:46px;height:46px;border-radius:50%;border:2px solid var(--stamp);color:var(--stamp);
        display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:12px;
        letter-spacing:.02em;transform:rotate(-6deg);flex-shrink:0;}
  .hdr h1{font-family:var(--serif);font-size:22px;margin:0;letter-spacing:.01em;color:var(--navy);}
  .hdr .tag{font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}

  .steps{display:flex;gap:2px;margin-bottom:24px;background:var(--line);padding:2px;border-radius:3px;}
  .step{flex:1;padding:11px 12px;background:var(--card);font-family:var(--mono);font-size:11px;text-transform:uppercase;
        letter-spacing:.05em;color:#a39d8c;position:relative;cursor:pointer;display:flex;align-items:center;gap:8px;
        transition:.15s;}
  .step:first-child{border-radius:2px 0 0 2px;}
  .step:last-child{border-radius:0 2px 2px 0;}
  .step-num{width:18px;height:18px;border-radius:50%;border:1px solid currentColor;display:inline-flex;align-items:center;
             justify-content:center;font-size:10px;flex-shrink:0;}
  .step.active{color:var(--navy);font-weight:600;background:var(--gold-soft);}
  .step.active .step-num{background:var(--gold);border-color:var(--gold);color:#fff;}
  .step.done{color:var(--ok);}
  .step.done .step-num{background:var(--ok);border-color:var(--ok);color:#fff;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:26px;margin-bottom:18px;
        box-shadow:0 1px 3px rgba(16,26,46,.05);}
  .card h2{font-family:var(--serif);font-size:17px;margin:0 0 16px;color:var(--navy);border-bottom:1px solid var(--line);
           padding-bottom:12px;font-weight:600;}
  .filepill{font-family:var(--mono);font-size:12px;font-weight:400;color:var(--muted);}

  .drop{border:2px dashed var(--line);border-radius:4px;padding:44px 20px;text-align:center;cursor:pointer;transition:.15s;
        background:linear-gradient(180deg,#fff,#fcfaf6);}
  .drop:hover{border-color:var(--gold);background:var(--gold-soft);}
  .drop input{display:none;}
  .drop-icon{font-size:30px;margin-bottom:10px;opacity:.6;}
  .drop .big{font-size:14px;font-weight:600;margin-bottom:4px;color:var(--navy);}
  .drop .small{font-family:var(--mono);font-size:11px;color:var(--muted);}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
  .field.full{grid-column:1/-1;}
  label{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);}
  input[type=text],input[type=number],select,textarea{
    border:1px solid var(--line);border-radius:3px;padding:9px 10px;font-family:var(--sans);font-size:13px;
    background:#fdfcfa;color:var(--ink);transition:.15s;
  }
  textarea{resize:vertical;min-height:48px;font-family:var(--sans);}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-soft);}
  .hint{font-family:var(--mono);font-size:11px;color:var(--muted);}

  button{font-family:var(--sans);font-size:12.5px;font-weight:600;letter-spacing:.01em;border:1px solid var(--navy);
         background:var(--navy);color:#fff;padding:10px 18px;cursor:pointer;border-radius:3px;transition:.12s;}
  button:hover{background:#000;border-color:#000;}
  button.ghost{background:#fff;color:var(--navy);}
  button.ghost:hover{background:#f4f1ea;}
  button.accent{background:var(--stamp);border-color:var(--stamp);}
  button.accent:hover{background:#7e2f24;}
  button.sm{padding:6px 11px;font-size:11px;}
  button:disabled{opacity:.4;cursor:not-allowed;}
  .btnrow{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;}

  .pill{display:inline-block;font-family:var(--mono);font-size:10px;padding:2px 9px;border:1px solid var(--line);
        border-radius:20px;color:var(--muted);}
  .pill.sub{margin-top:3px;}
  .missing{color:var(--warn);font-style:italic;}

  .manage-row{display:flex;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid #eee6d9;}
  .manage-row span{flex:1;font-size:13px;}
  .link-btn{background:none;border:none;color:var(--gold);font-family:var(--mono);font-size:10px;text-decoration:underline;
            padding:0;cursor:pointer;letter-spacing:0;font-weight:600;}

  table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:8px;}
  th{text-align:left;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.04em;
     color:var(--muted);border-bottom:2px solid var(--navy);padding:8px;}
  td{padding:9px 8px;border-bottom:1px solid #eee6d9;vertical-align:top;}

  .company-group{margin-bottom:22px;}
  .company-group-hdr{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--navy);
                      border-radius:4px 4px 0 0;color:#fff;}
  .company-name{font-family:var(--serif);font-weight:600;font-size:14px;flex:1;}
  .company-group-hdr .pill{color:#e8e2d3;border-color:rgba(255,255,255,.3);}
  .company-group table{border:1px solid var(--line);border-top:none;}

  .batch-empty{padding:32px;text-align:center;color:#a39d8c;font-family:var(--mono);font-size:12px;}
  .warn-box{background:var(--warn-soft);border:1px solid #e4c17a;color:var(--warn);padding:11px 13px;border-radius:3px;
            font-size:12.5px;margin-bottom:16px;}
  .search-btn{font-family:var(--mono);font-size:10px;text-decoration:underline;color:var(--gold);background:none;
              border:none;padding:0;cursor:pointer;font-weight:600;letter-spacing:0;}
  .field-with-action{display:flex;justify-content:space-between;align-items:center;}

  .summary-box{margin-top:6px;border:1px solid var(--line);border-radius:4px;padding:16px 18px;background:#fbfaf6;}
  .summary-hdr{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:11px;
               text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:10px;}
  .summary-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px 20px;}
  .summary-grid > div{display:flex;flex-direction:column;gap:3px;}
  .summary-grid label{font-family:var(--mono);font-size:9.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);}
  .summary-grid span{font-size:13px;color:var(--ink);font-weight:500;}

  .modal-bg{position:fixed;inset:0;background:rgba(16,26,46,.55);display:flex;align-items:center;justify-content:center;
            z-index:50;padding:20px;}
  .modal{background:#fff;padding:24px;width:400px;max-height:88vh;overflow-y:auto;border-radius:5px;
         box-shadow:0 12px 40px rgba(0,0,0,.25);}
  .modal h3{margin:0 0 14px;font-family:var(--serif);font-size:16px;color:var(--navy);}
  .modal-form{margin-top:14px;padding-top:14px;border-top:1px dashed var(--line);}
  .del{color:var(--stamp);font-family:var(--mono);font-size:11px;cursor:pointer;background:none;border:none;
       text-decoration:underline;padding:0;}
  .badge-count{font-family:var(--mono);background:var(--stamp);color:#fff;border-radius:50%;width:18px;height:18px;
               display:inline-flex;align-items:center;justify-content:center;font-size:10px;margin-left:auto;}
</style>

function useStore(key, initial, shared=false){
  const [val, setVal] = useState(initial);
  const [loaded, setLoaded] = useState(false);
  useEffect(()=>{
    (async()=>{
      try{
        const r = await window.storage.get(key, shared);
        if(r) setVal(JSON.parse(r.value));
      }catch(e){}
      setLoaded(true);
    })();
  },[]);
  const save = async(v)=>{
    setVal(v);
    try{ await window.storage.set(key, JSON.stringify(v), shared); }catch(e){}
  };
  return [val, save, loaded];
}

// The invoice has a two-column row (Buyer | Consignee) so a naive top-to-bottom line
// read still interleaves both columns' text. We anchor on the exact "Consignee" header
// item's x-position and only keep items in/right-of that column, below that header,
// until a stop-field is hit -- this reliably isolates just the Consignee name+address.
function extractConsigneeFromItems(items){
  const header = items.find(it=>it.str.trim().toLowerCase()==='consignee');
  if(!header) return {name:'', addr:''};
  const colX = header.x - 15;
  const belowItems = items.filter(it=> it.page===header.page && it.y < header.y - 2 && it.x >= colX);
  const lines = [];
  belowItems.forEach(it=>{
    let line = lines.find(l=>Math.abs(l.y-it.y)<3);
    if(!line){ line = {y:it.y, items:[]}; lines.push(line); }
    line.items.push(it);
  });
  lines.sort((a,b)=>b.y-a.y);
  lines.forEach(l=>l.items.sort((a,b)=>a.x-b.x));
  const texts = lines.map(l=>l.items.map(i=>i.str).join(' ').replace(/\s+/g,' ').trim()).filter(Boolean);
  const stop = /(NOTIFY|Country of|Invoice\s*NO|GSTIN|Buyers?\s*Order|SHIPPING|OTHER\s*REFRENCE|Pre-Carriage|Vessel|Port of|Terms of Delivery)/i;
  const out = [];
  for(const t of texts){
    if(stop.test(t)) break;
    out.push(t);
    if(out.length>=4) break;
  }
  const name = (out[0]||'').replace(/^M\/s\s*/i,'').trim();
  const addr = out.slice(1).join('\n');
  return {name, addr};
}

function extractInvoiceFields(text){
  const d = {};
  let m = text.match(/(EX\d{5,8})/); d.invoice_no = m ? m[1] : '';
  m = text.match(/(\d{2}-\d{2}-\d{4})/); d.date = m ? m[1] : '';
  m = text.match(/TRACKING\s*NO\.?\s*:?\s*([A-Z0-9]{6,})/i)
    || text.match(/SHIPPING\s*NO\.?\s*\/?\s*TRACKING\s*NO\.?\s*:?\s*([A-Z0-9]{6,})/i)
    || text.match(/AWB\s*(?:NO\.?)?\s*:?\s*([A-Z0-9]{6,})/i);
  d.tracking_no = m ? m[1] : '';
  m = text.match(/Consignee\s*\n([\s\S]*?)(?:NOTIFY|Country of Origin)/);
  let consignee = m ? m[1] : '';
  let lines = consignee.split('\n').map(l=>l.trim()).filter(Boolean);
  let name='', addr=[];
  lines.forEach(l=>{
    if(l.startsWith('M/s')) name = l.replace('M/s','').trim();
    else if(!/^state/i.test(l)) addr.push(l);
  });
  d.consignee_name = name;
  d.consignee_addr = addr.join('\n');
  m = text.match(/Country of Destination of Goods\s*\n?\s*(.+)/); d.country = m ? m[1].trim().split(/\s+/)[0] : 'USA';
  m = text.match(/TOTAL\s+([\d,]+\.\d{2})/); d.fob_usd = m ? m[1].replace(/,/g,'') : '';
  m = text.match(/EXCHANGE\s*\n?\s*([\d,]+\.\d{2})\s*\n?\s*RATE/i) || text.match(/RATE\s*\n?\s*([\d,]+\.\d{2})/i);
  d.exchange_rate = m ? m[1].replace(/,/g,'') : '';
  m = text.match(/Amount in INR[\s\S]*?([\d,]+\.\d{2})/); d.amount_inr = m ? m[1].replace(/,/g,'') : '';
  m = text.match(/\b(\d{8})\b/); d.hsn = m ? m[1] : '30049099';
  m = text.match(/^\s*1\.\)\s*([A-Z0-9 <>\/\-\.]+?)\s+OTHERS/m) || text.match(/1\.\)\s*(.+?)\n/);
  d.brand_name = m ? m[1].replace('<Net>','').trim() : '';
  m = text.match(/(\d+)\s*PCS/); d.qty = m ? m[1] : '';
  return d;
}

// ---------- Excel generation (mirrors Mediseller's exact PBE-II template) ----------

function excelStyleFromDef(def){
  const style = {};
  if(def.font){
    style.font = {
      name: def.font.name || 'Times New Roman',
      size: def.font.size || 10,
      bold: !!def.font.bold,
    };
  } else {
    style.font = {name:'Times New Roman', size:10};
  }
  if(def.align){
    let v = def.align.v;
    if(v === 'center') v = 'middle';
    style.alignment = {
      horizontal: def.align.h || undefined,
      vertical: v || undefined,
      wrapText: !!def.align.wrap,
    };
  }
  if(def.border){
    style.border = {};
    ['top','bottom','left','right'].forEach(side=>{
      if(def.border[side]) style.border[side] = {style: def.border[side]};
    });
  }
  if(def.fill && def.fill !== 'FFFFFF'){
    style.fill = {type:'pattern', pattern:'solid', fgColor:{argb:'FF'+def.fill}};
  }
  return style;
}

function setCellStyled(ws, addr, value, def){
  const cell = ws.getCell(addr);
  if(value && typeof value === 'object' && 'formula' in value){
    cell.value = {formula: value.formula, result: value.result};
  } else if(typeof value === 'string' && value.startsWith('=')){
    cell.value = {formula: value.slice(1)};
  } else if(value !== undefined && value !== null){
    cell.value = value;
  }
  const s = excelStyleFromDef(def || {});
  if(s.font) cell.font = s.font;
  if(s.alignment) cell.alignment = s.alignment;
  if(s.border) cell.border = s.border;
  if(s.fill) cell.fill = s.fill;
}

function fml(formula, result){ return {formula, result}; }

function colsOfRow(rowNum){
  const cols = [];
  Object.keys(TEMPLATE.cells).forEach(addr=>{
    const m = addr.match(/^([A-Z]+)(\d+)$/);
    if(parseInt(m[2]) === rowNum) cols.push(m[1]);
  });
  return cols;
}

function applyTemplateRow(ws, templateRow, targetRow, overrides){
  overrides = overrides || {};
  colsOfRow(templateRow).forEach(col=>{
    const def = TEMPLATE.cells[col+templateRow];
    const addr = col+targetRow;
    const val = overrides.hasOwnProperty(col) ? overrides[col] : def.v;
    setCellStyled(ws, addr, val, def);
  });
}

function shiftMergeStr(mergeStr, rowShift){
  return mergeStr.replace(/([A-Z]+)(\d+)/g, (m, col, row) => col + (parseInt(row)+rowShift));
}

function mergesStartingInRows(rows){
  const set = new Set(rows);
  return TEMPLATE.merges.filter(m=>{
    const rm = m.match(/[A-Z]+(\d+):[A-Z]+(\d+)/);
    return set.has(parseInt(rm[1]));
  });
}

async function buildWorkbook(shipments, company, billDate, bank){
  const wb = new ExcelJS.Workbook();
  const ws = wb.addWorksheet('Sheet1', {views:[{showGridLines:false}]});

  Object.entries(TEMPLATE.colWidths).forEach(([col,w])=>{ ws.getColumn(col).width = w; });

  // static rows 1-19
  for(let r=1;r<=19;r++){
    let overrides = {};
    if(r===9){
      overrides = {
        A: billDate || TEMPLATE.cells['A9'].v,
        B: company.foreign_post_code || 725,
        E: company.name,
        I: company.address,
        M: company.iec,
        O: company.state_code || 7,
        P: company.gstin,
        R: (bank && bank.ad_code) ? bank.ad_code : (company.ad_code || ''),
        T: company.drug_license,
        U: 'NA',
      };
    }
    applyTemplateRow(ws, r, r, overrides);
  }
  mergesStartingInRows(Array.from({length:19},(_,i)=>i+1)).forEach(m=>{ try{ws.mergeCells(m);}catch(e){} });

  const N = shipments.length;
  const dutyHeaderOffset = N-4;
  const dutyStart = 24+N;
  const totalsRow = dutyStart+N;

  // parcel rows 20..19+N
  let serialCounter = 0;
  let totalInrSum = 0, totalWeightSum = 0;
  for(let i=0;i<N;i++){
    const r = 20+i;
    const s = shipments[i];
    const cth = parseInt(s.hsn) || 30043190;
    const gross = parseFloat(s.gross_weight)||0;
    const net = gross < 3000 ? 0.8*gross : 0.7*gross;
    const fob = parseFloat(s.fob_usd)||0;
    const rate = parseFloat(s.exchange_rate)||0;
    const amountInr = rate*fob;
    serialCounter = i+1;
    totalInrSum += amountInr;
    totalWeightSum += gross;
    applyTemplateRow(ws, 20, r, {
      A: i===0 ? 1 : fml(`+A${r-1}+1`, serialCounter),
      B: `M/s ${s.consignee_name}\n${s.consignee_addr}`,
      D: s.country || 'USA',
      F: (s.product_salt || s.brand_name || '').toUpperCase(),
      G: 30043190,
      H: 'BOX',
      J: parseFloat(s.qty)||0,
      K: `${s.invoice_no}\n${s.date}`,
      M: gross,
      N: fml(`IF(M${r}<3000,0.8*M${r},0.7*M${r})`, net),
      O: s.tracking_no || '',
      Q: fob,
      R: 'USD',
      S: rate,
      U: fml(`S${r}*Q${r}`, amountInr),
    });
    ws.getRow(r).height = TEMPLATE.rowHeights['20'];
    mergesStartingInRows([20]).forEach(m=>{ try{ws.mergeCells(shiftMergeStr(m, i));}catch(e){} });
  }

  // duty header block (originally rows 24-27) shifted by dutyHeaderOffset
  for(let tr=24; tr<=27; tr++){
    const r = tr + dutyHeaderOffset;
    let overrides = {};
    if(tr===24){ overrides = { V: fml(`SUM(U20:V${19+N})`, totalInrSum) }; }
    applyTemplateRow(ws, tr, r, overrides);
    ws.getRow(r).height = TEMPLATE.rowHeights[String(tr)];
  }
  mergesStartingInRows([24,25,26,27]).forEach(m=>{ try{ws.mergeCells(shiftMergeStr(m, dutyHeaderOffset));}catch(e){} });
  // vertical merge U24:U25 / V24:V25 needs special handling since it spans two rows both shifted by same offset - shiftMergeStr already handles both row numbers consistently.

  // duty rows
  let dutyInrSum = 0;
  for(let i=0;i<N;i++){
    const r = dutyStart+i;
    const parcelRow = 20+i;
    const s = shipments[i];
    const fob = parseFloat(s.fob_usd)||0;
    const rate = parseFloat(s.exchange_rate)||0;
    const amountInr = rate*fob;
    dutyInrSum += amountInr;
    applyTemplateRow(ws, 28, r, {
      A: 30043190,
      B: fml(`K${parcelRow}`, `${s.invoice_no}\n${s.date}`),
      C: 'USD',
      D: fml(`U${parcelRow}`, amountInr),
      S: company.lut_bond_code || 'AD0704240244682',
    });
    ws.getRow(r).height = TEMPLATE.rowHeights['28'];
    mergesStartingInRows([28]).forEach(m=>{ try{ws.mergeCells(shiftMergeStr(m, r-28));}catch(e){} });
  }

  // totals row
  applyTemplateRow(ws, 32, totalsRow, {
    B: N,
    D: fml(`SUM(D${dutyStart}:D${dutyStart+N-1})`, dutyInrSum),
    F: N,
    H: fml(`SUM(M20:M${19+N})`, totalWeightSum),
  });
  ws.getRow(totalsRow).height = TEMPLATE.rowHeights['32'];

  return wb;
}

async function downloadWorkbook(shipments, company, billDate, filename, bank){
  const wb = await buildWorkbook(shipments, company, billDate, bank);
  const buf = await wb.xlsx.writeBuffer();
  const blob = new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function base64ToBytes(b64){
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for(let i=0;i<binary.length;i++) bytes[i] = binary.charCodeAt(i);
  return bytes;
}

// Edits the ORIGINAL invoice PDF in place: whites-out only the product/<Net> line
// and the "MFG.BY:xxx" value line, then draws the corrected text at the exact same
// position/size -- every other pixel of the original MARG invoice stays untouched.
async function buildCorrectedInvoicePdf(shipment){
  if(!shipment.pdf_b64){
    throw new Error('Original PDF was not captured for this shipment (re-upload it).');
  }
  const { PDFDocument, rgb, StandardFonts } = PDFLib;
  const srcBytes = base64ToBytes(shipment.pdf_b64);
  const pdfDoc = await PDFDocument.load(srcBytes);
  const font = await pdfDoc.embedFont(StandardFonts.TimesRoman);
  const boldFont = await pdfDoc.embedFont(StandardFonts.TimesRomanBold);
  const pages = pdfDoc.getPages();

  const patch = (item, newText) => {
    if(!item) return;
    const page = pages[item.page];
    // whiteout the original text box (small padding to fully cover ascenders/descenders)
    page.drawRectangle({
      x: item.x - 1, y: item.y - 3,
      width: item.w + 4, height: item.h + 5,
      color: rgb(1,1,1),
    });
    if(newText){
      page.drawText(newText, {
        x: item.x, y: item.y,
        size: item.h * 0.95,
        font: boldFont, color: rgb(0,0,0),
      });
    }
  };

  const saltName = (shipment.product_salt || '').trim().toUpperCase() || (shipment.brand_name||'').toUpperCase();
  patch(shipment.pdf_product_item, saltName);

  if(shipment.mfg_by && shipment.mfg_by.trim()){
    patch(shipment.pdf_mfg_item, 'MFG.BY:'+shipment.mfg_by.trim().toUpperCase());
  }

  return pdfDoc.save();
}

async function downloadInvoicePDF(shipment){
  const bytes = await buildCorrectedInvoicePdf(shipment);
  const blob = new Blob([bytes], {type:'application/pdf'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const safeName = (shipment.invoice_no||'invoice').replace(/[^A-Za-z0-9_-]/g,'_');
  a.href = url; a.download = `Invoice_${safeName}_corrected.pdf`;
  a.click();
  URL.revokeObjectURL(url);
}

async function downloadAllInvoicePdfsZip(shipments, zipFilename){
  const zip = new JSZip();
  for(const s of shipments){
    if(!s.pdf_b64) continue;
    const bytes = await buildCorrectedInvoicePdf(s);
    const safeName = (s.invoice_no||'invoice').replace(/[^A-Za-z0-9_-]/g,'_');
    zip.file(`Invoice_${safeName}_corrected.pdf`, bytes);
  }
  const blob = await zip.generateAsync({type:'blob'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = zipFilename;
  a.click();
  URL.revokeObjectURL(url);
}

    setFileName(file.name);
    const buf = await file.arrayBuffer();
    // keep original PDF bytes so the corrected copy preserves the exact original layout/formatting
    let binary = '';
    const bytes = new Uint8Array(buf);
    for(let i=0;i<bytes.length;i++) binary += String.fromCharCode(bytes[i]);
    const pdfB64 = btoa(binary);

    const pdf = await pdfjsLib.getDocument({data:buf.slice(0)}).promise;
    let full = '';
    let productItem = null, mfgItem = null;
    const allItems = [];
    for(let p=1;p<=pdf.numPages;p++){
      const page = await pdf.getPage(p);
      const content = await page.getTextContent();
      let lastY=null, line='';
      content.items.forEach(item=>{
        if(lastY!==null && Math.abs(item.transform[5]-lastY)>3){ full+=line+'\n'; line=''; }
        line += item.str + ' ';
        lastY = item.transform[5];
        const rec = {page:p-1, str:item.str, x:item.transform[4], y:item.transform[5], w:item.width, h:Math.abs(item.transform[3])||9};
        allItems.push(rec);
        if(!productItem && /<Net>/i.test(item.str)) productItem = rec;
        if(!mfgItem){
          const m = item.str.match(/^MFG\.?BY:?\s*(.*)$/i);
          if(m && m[1] && m[1].trim().length>0) mfgItem = rec;
        }
      });
      full += line + '\n';
    }

    const extracted = extractInvoiceFields(full);
    const consignee = extractConsigneeFromItems(allItems);

    setStep(2);
  };

    setEditingBatchIdx(null);
    setForm(null); setFileName('');
    setStep(4);

              <label>Exchange Rate</label>
              <input type="text" value={form.exchange_rate||''} onChange={e=>setForm({...form,exchange_rate:e.target.value})}/>
              <span className="hint">Amount (INR) = FOB &times; Exchange Rate, calculated automatically in the Excel.</span>
            </div>
          </div>

          <div className="summary-box">
            <div className="summary-hdr">
              <span>Auto-read details</span>
              <button className="link-btn" onClick={()=>setShowAllFields(!showAllFields)}>{showAllFields ? 'Hide fields' : 'Edit a field'}</button>
            </div>
            {!showAllFields ? (
              <div className="summary-grid">
                <div><label>Invoice</label><span>{form.invoice_no} &middot; {form.date}</span></div>
                <div><label>Consignee</label><span>{form.consignee_name}</span></div>
                <div><label>Country</label><span>{form.country}</span></div>
                <div><label>Tracking No.</label><span>{form.tracking_no}</span></div>
                <div><label>Quantity</label><span>{form.qty}</span></div>
                <div><label>HSN / CTH</label><span>{form.hsn}</span></div>
              </div>
            ) : (
              <div className="grid">
                <div className="field"><label>Invoice No.</label><input type="text" value={form.invoice_no||''} onChange={e=>setForm({...form,invoice_no:e.target.value})}/></div>
                <div className="field"><label>Date</label><input type="text" value={form.date||''} onChange={e=>setForm({...form,date:e.target.value})}/></div>
                <div className="field full"><label>Consignee Name</label><input type="text" value={form.consignee_name||''} onChange={e=>setForm({...form,consignee_name:e.target.value})}/></div>
                <div className="field full"><label>Consignee Address (press Enter for new line, same as it appears on the Excel)</label><textarea value={form.consignee_addr||''} onChange={e=>setForm({...form,consignee_addr:e.target.value})}/></div>
                <div className="field"><label>Country</label><input type="text" value={form.country||''} onChange={e=>setForm({...form,country:e.target.value})}/></div>
                <div className="field"><label>Tracking No.</label><input type="text" value={form.tracking_no||''} onChange={e=>setForm({...form,tracking_no:e.target.value})}/></div>
                <div className="field"><label>Brand Name (from invoice)</label><input type="text" value={form.brand_name||''} onChange={e=>setForm({...form,brand_name:e.target.value})}/></div>
                <div className="field"><label>Quantity</label><input type="text" value={form.qty||''} onChange={e=>setForm({...form,qty:e.target.value})}/></div>
                <div className="field"><label>HSN / CTH</label><input type="text" value={form.hsn||''} onChange={e=>setForm({...form,hsn:e.target.value})}/></div>
              </div>
            )}
          </div>
          <div className="btnrow">
            <button className="ghost" onClick={()=>setStep(2)}>Back</button>
            <button className="accent" onClick={addToBatch}>{editingBatchIdx!==null ? 'Save changes to batch' : "Add to today's batch"}</button>
          </div>
        </div>
      )}

      {step===4 && (
        <div className="card">
          <h2>Today's Batch</h2>
          {batch.length===0 ? (
            <div className="batch-empty">Batch is empty &mdash; upload an invoice first (Step 1).</div>
          ) : (
            <React.Fragment>
              {Object.entries(grouped).map(([companyId, items])=>{
                const comp = companies.find(c=>c.id===companyId) || {name:companyId};
                return (
                  <div key={companyId} className="company-group">
                    <div className="company-group-hdr">
                      <span className="company-name">{comp.name}</span>
                      <span className="pill">{items.length} shipment{items.length>1?'s':''}</span>
                      <button className="sm ghost" disabled={busy} onClick={async()=>{ setBusy(true); try{ await downloadAllInvoicePdfsZip(items, `Invoices_${comp.name}_${new Date().toISOString().slice(0,10)}.zip`); } finally{ setBusy(false); } }}>Download all PDFs (.zip)</button>
                      <button className="sm accent" disabled={busy} onClick={()=>downloadForCompany(companyId)}>Download PBE-II Excel</button>
                    </div>
                    <table>
                      <thead><tr><th>#</th><th>Invoice</th><th>Consignee</th><th>Salt Name</th><th>INR</th><th></th></tr></thead>
                      <tbody>
                        {items.map((b)=>{
                          const idx = batch.indexOf(b);
                          return (
                            <tr key={idx}>
                              <td>{idx+1}</td>
                              <td>{b.invoice_no}<br/><span className="pill sub">{b.tracking_no}</span></td>
                              <td>{b.consignee_name}</td>
                              <td>{b.product_salt || <span className="missing">missing</span>}</td>
                              <td>{b.amount_inr}</td>
                              <td>
                                <button className="sm ghost" onClick={()=>editBatchItem(idx)}>Edit</button>{' '}
                                <button className="sm ghost" onClick={()=>downloadInvoicePDF(b).catch(err=>alert('Could not build corrected PDF: '+err.message))}>PDF</button>{' '}
                                <button className="del" onClick={()=>removeBatchItem(idx)}>Remove</button>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                );
              })}
              <div className="btnrow">
                <button className="ghost" onClick={()=>setStep(1)}>+ Add another shipment</button>
                <button className="ghost" onClick={exportBatchJson}>Export batch backup (.json)</button>
              </div>
            </React.Fragment>
          )}
        </div>
      )}

      {showMgr && <ManagerModal type={showMgr} companies={companies} setCompanies={setCompanies} banks={banks} setBanks={setBanks} onClose={()=>setShowMgr(null)} />}
    </div>
  );
}

function ManagerModal({type, companies, setCompanies, banks, setBanks, onClose}){
  const isCompany = type==='company';
  const list = isCompany ? companies : banks;
  const setList = isCompany ? setCompanies : setBanks;
  const blank = isCompany ? {name:'',address:'',gstin:'',iec:'',drug_license:'',state_code:'7',foreign_post_code:'725',ad_code:'NA',lut_bond_code:''} : {name:'',company_id: companies[0] ? companies[0].id : '', account_no:'',swift:'',branch:'',ad_code:''};
  const [f, setF] = useState(blank);
  const [editId, setEditId] = useState(null);

  const startEdit = (item) => { setF(item); setEditId(item.id); };
  const save = () => {
    if(!f.name) return;
    if(!isCompany && !f.company_id) return;
    if(editId){
      setList(list.map(x=>x.id===editId ? {...f, id: editId} : x));
    } else {
      setList([...list, {...f, id: (isCompany?'c_':'b_')+Date.now()}]);
    }
    setF(blank); setEditId(null);
  };
  const del = (id) => { setList(list.filter(x=>x.id!==id)); if(editId===id){ setF(blank); setEditId(null);} };
  const companyName = (id) => (companies.find(c=>c.id===id)||{}).name || id;

  return (
    <div className="modal-bg" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <h3>Manage {isCompany ? 'Companies':'Banks'}</h3>
        {list.map(item=>(
          <div className="manage-row" key={item.id}>
            <span>{item.name}{!isCompany && item.account_no ? ' \u2014 '+item.account_no : ''}{!isCompany && <span className="hint" style={{display:'block'}}>{companyName(item.company_id)}</span>}</span>
            <button className="link-btn" onClick={()=>startEdit(item)}>edit</button>
            <button className="del" onClick={()=>del(item.id)}>delete</button>
          </div>
        ))}
        <div className="modal-form">
          {isCompany ? (
            <React.Fragment>
              <div className="field"><label>Company name</label><input type="text" value={f.name} onChange={e=>setF({...f,name:e.target.value})}/></div>
              <div className="field"><label>Address</label><textarea value={f.address} onChange={e=>setF({...f,address:e.target.value})}/></div>
              <div className="grid">
                <div className="field"><label>GSTIN</label><input type="text" value={f.gstin} onChange={e=>setF({...f,gstin:e.target.value})}/></div>
                <div className="field"><label>IEC</label><input type="text" value={f.iec} onChange={e=>setF({...f,iec:e.target.value})}/></div>
              </div>
              <div className="grid">
                <div className="field"><label>Drug License No.</label><input type="text" value={f.drug_license} onChange={e=>setF({...f,drug_license:e.target.value})}/></div>
                <div className="field"><label>LUT / Bond AD Code</label><input type="text" value={f.lut_bond_code} onChange={e=>setF({...f,lut_bond_code:e.target.value})}/></div>
              </div>
            </React.Fragment>
          ) : (
            <React.Fragment>
              <div className="field"><label>Company</label>
                <select value={f.company_id} onChange={e=>setF({...f,company_id:e.target.value})}>
                  {companies.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                </select>
              </div>
              <div className="field"><label>Bank name</label><input type="text" value={f.name} onChange={e=>setF({...f,name:e.target.value})}/></div>
              <div className="grid">
                <div className="field"><label>Account No.</label><input type="text" value={f.account_no} onChange={e=>setF({...f,account_no:e.target.value})}/></div>
                <div className="field"><label>SWIFT Code</label><input type="text" value={f.swift} onChange={e=>setF({...f,swift:e.target.value})}/></div>
              </div>
              <div className="grid">
                <div className="field"><label>AD Code</label><input type="text" value={f.ad_code} onChange={e=>setF({...f,ad_code:e.target.value})}/></div>
                <div className="field"><label>Branch</label><input type="text" value={f.branch} onChange={e=>setF({...f,branch:e.target.value})}/></div>
              </div>
            </React.Fragment>
          )}
          <div className="btnrow">
            <button onClick={save}>{editId ? 'Save changes' : 'Add'}</button>
            {editId && <button className="ghost" onClick={()=>{setF(blank); setEditId(null);}}>Cancel edit</button>}
            <button className="ghost" onClick={onClose}>Close</button>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
